<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="estilos.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
</head>
<body>
    <h1><mark> CALCULADORA FUNCIONAL HECHA POR LORD MUGEN</mark></h1>
    <div class="container">
        
        <div class="calculadora">
            <div class="display">
                <div id="valor-anterior">12345</div>
            </br>
            <span id="valor-actual"></span>  
            </div>
            <div class="botones-arriba">
                <Button class="history"><i class="fas fa-clock"></i></Button>
                <button class="backspace"><i class="fas fa-backspace"></i></button>                        
            </div>
            
        <div class="grupo-botones">
            <button class="operador" style="color: #ffa500;">C</button> 
            <button class="operador">()</button>
            <button class="operador">%</button>
            <button class="operador">&#247;</button>
            <button class="numero">7</button>
            <button class="numero">8</button>
            <button class="numero">9</button>
            <button class="operador">X</button>
            <button class="numero">4</button>
            <button class="numero">5</button>
            <button class="numero">6</button>
            <button class="operador">-</button>
            <button class="numero">1</button>
            <button class="numero">2</button>
            <button class="numero">3</button>
            <button class="operador">+</button>
            <button class="operador">+/-</button>
            <button class="numero">0</button>
            <button class="numero">.</button>
            <button class="operador">=</button>
        </div> 

        </div>

    </div>
   
    
</body>
</html>
